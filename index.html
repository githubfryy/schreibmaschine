<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Eine Webapp für kreatives Schreiben in Gruppen mit Timer und Prompts">
    <meta name="theme-color" content="#3498db">
    <title>Schreibmaschine</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Schreibmaschine">
</head>
<body>
    <div class="container">
        <h1>Schreibmaschine</h1>
        
        <!-- Session-Code Eingabe (Startseite) -->
        <div id="session-start" class="screen">
            <h2>Schreibsession beitreten</h2>
            <div class="input-group">
                <input type="text" id="session-code" placeholder="Session-Code eingeben" maxlength="3">
                <button id="join-session">Beitreten</button>
            </div>
            <p class="info">Bitte gib den 3-stelligen Code ein, den du von der Gruppenleitung erhalten hast.</p>
        </div>
        
        <!-- Prompt-Anzeige (Hauptbildschirm) -->
        <div id="prompt-screen" class="screen hidden">
            <div class="timer-container">
                <div id="timer">00:00</div>
                <button id="toggle-timer">Timer ausblenden</button>
            </div>
            
            <div class="prompt-container">
                <h2>Dein Prompt:</h2>
                <div id="current-prompt" class="prompt"></div>
            </div>
            
            <div class="controls">
                <button id="next-prompt" class="admin-only hidden">Nächster Prompt</button>
            </div>
        </div>
        
        <!-- Session beendet -->
        <div id="session-end" class="screen hidden">
            <h2>Schreibsession beendet</h2>
            <p>Alle Prompts wurden angezeigt. Danke fürs Teilnehmen!</p>
            <button id="restart">Neue Session</button>
        </div>
    </div>

    <script src="libs/marked.min.js"></script>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
